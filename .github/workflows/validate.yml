name: Validate OpenEnv Environment

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-inference.txt
          pip install openenv-core
          pip install pytest

      - name: Run submission verification
        run: |
          chmod +x ./verify_submission.sh
          ./verify_submission.sh

      - name: Docker build smoke check
        run: |
          docker build -t support-inbox-env .
